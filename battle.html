<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokemon Battle Intro</title>

<style>
body{
    background:#f2f2f2;
    font-family:Verdana, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* container */
.battle-container{
    text-align:center;
}

/* textbox */
.textbox{
    width:320px;
    padding:16px 20px;
    background:white; /* fill */
    
    border:6px solid black; /* outer border */
    border-radius:18px; /* rounded corners */

    box-shadow:
        inset 0 0 0 4px white,   /* inner white ring */
        inset 0 0 0 8px black;   /* inner black border */

    font-size:18px;
    min-height:28px;

    display:none;
}

/* pokeball */
.pokeball{
    width:70px;
    margin-top:15px;
    display:none;
    animation:bounce 1.2s infinite;
}

/* small bounce animation */
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

/* start button */
button{
    padding:10px 20px;
    margin-top:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="battle-container">

<div id="textbox" class="textbox"></div>

<img id="pokeball"
class="pokeball"
src="https://static.wikia.nocookie.net/pokemon/images/3/3b/Love_Ball_HeartGold_and_SoulSilver.png/revision/latest?cb=20241008004443">

<br>
<button onclick="startBattle()">Start Battle</button>

</div>

<script>

const text = "Cici wants to battle!";
let i = 0;

function startBattle(){

    const box = document.getElementById("textbox");
    const pokeball = document.getElementById("pokeball");

    box.style.display = "block";
    pokeball.style.display = "block";

    typeWriter();
}

function typeWriter(){

    const box = document.getElementById("textbox");

    if(i < text.length){
        box.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 45);
    }

}

</script>

</body>
</html>
