<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
<title>Pokemon Battle Intro</title>

<style>
body{
    background:#fff;
    color: #c79971;
    font-family:Hachi Maru Pop, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* container */
.battle-container{
    text-align:center;
}

/* textbox */
.textbox{
    width:320px;
    padding:16px 20px;
    background:white;

    border-width: 8px;
    border-style: solid;
    border-image: url("https://file.garden/aXTkw7hiK3vn4ais/wrap.png") 8 fill round; 

    box-shadow:
        inset 0 0 0 4px white,
        inset 0 0 0 8px black;

    font-size:18px;
    min-height:28px;

    display:none;
}

/* pokeball button */
.pokeball{
    width:90px;
    cursor:pointer;
    transition:transform .2s;
}

.pokeball:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="battle-container">

<img id="pokeball"
class="pokeball"
src="https://static.wikia.nocookie.net/pokemon/images/3/3b/Love_Ball_HeartGold_and_SoulSilver.png/revision/latest?cb=20241008004443"
onclick="startBattle()">

<div id="textbox" class="textbox"></div>

</div>

<script>

const text = "Cici wants to battle!";
let i = 0;

function startBattle(){

    const box = document.getElementById("textbox");
    const pokeball = document.getElementById("pokeball");

    /* hide pokeball */
    pokeball.style.display = "none";

    /* show textbox */
    box.style.display = "block";

    typeWriter();
}

function typeWriter(){

    const box = document.getElementById("textbox");

    if(i < text.length){
        box.innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 45);
    }

}

</script>

</body>
</html>
