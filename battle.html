<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pokéball Battle Start</title>

<style>
body{
    background:#f5f5f5;
    font-family:Verdana, sans-serif;
    text-align:center;
    padding-top:100px;
}

/* pokeball image */
.pokeball{
    width:120px;
    cursor:pointer;
    transition:transform .2s;
}

.pokeball:hover{
    transform:scale(1.1);
}

/* textbox */
.battle-text{
    display:none;
    margin:30px auto;
    padding:15px 25px;
    width:260px;
    background:white;
    border:4px solid black;
    border-radius:6px;
    font-size:18px;
}
</style>
</head>

<body>

<img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Poké_Ball_icon.svg"
class="pokeball"
onclick="startBattle()">

<div id="battleBox" class="battle-text">
    ___ wants to battle!
</div>

<script>
function startBattle(){
    document.getElementById("battleBox").style.display = "block";
}
</script>

</body>
</html>
