<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#ffe6f2;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

/* MP3 PLAYER BODY */

.player{
width:420px;
height:160px;
background:linear-gradient(145deg,#ffd4ec,#ffb6e3);
border-radius:40px;
padding:20px;
box-shadow:
inset 0 3px 8px rgba(255,255,255,0.7),
inset 0 -4px 8px rgba(255,150,200,0.4),
0 15px 35px rgba(255,120,180,0.3);
display:flex;
align-items:center;
gap:20px;
}

/* LEFT BUTTON */

.play-button{
width:70px;
height:70px;
border-radius:50%;
border:none;
background:linear-gradient(145deg,#fff,#ffd6f0);
box-shadow:
0 6px 10px rgba(255,120,180,0.4),
inset 0 2px 5px rgba(255,255,255,0.9);
font-size:26px;
cursor:pointer;
}

/* SCREEN */

.screen{
flex:1;
height:80px;
border-radius:20px;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
padding:10px 15px;
display:flex;
flex-direction:column;
justify-content:center;
box-shadow:inset 0 2px 6px rgba(255,255,255,0.7);
}

.song{
font-weight:600;
color:#d14b8f;
font-size:16px;
}

.artist{
font-size:13px;
opacity:0.6;
}

/* PROGRESS BAR */

.progress{
height:6px;
background:#ffd3ea;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#ff69b4;
transition:width 0.2s linear;
}

/* RIGHT BUTTON CLUSTER */

.controls{
display:grid;
grid-template-columns:repeat(2,32px);
gap:8px;
}

.controls button{
border:none;
border-radius:10px;
background:white;
box-shadow:0 4px 6px rgba(255,120,180,0.3);
cursor:pointer;
}

</style>
</head>

<body>

<div class="player">

<button class="play-button" id="play">▶</button>

<div class="screen">
<div class="song">song title</div>
<div class="artist">artist name</div>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>
</div>

<div class="controls">
<button onclick="audio.currentTime-=10">⏪</button>
<button onclick="audio.currentTime+=10">⏩</button>
<button onclick="audio.volume=Math.max(0,audio.volume-0.1)">🔉</button>
<button onclick="audio.volume=Math.min(1,audio.volume+0.1)">🔊</button>
</div>

</div>

<audio id="audio" src="music.mp3"></audio>

<script>

const audio = document.getElementById("audio")
const playBtn = document.getElementById("play")
const progress = document.getElementById("progress")

playBtn.onclick = () => {
if(audio.paused){
audio.play()
playBtn.innerHTML="❚❚"
}else{
audio.pause()
playBtn.innerHTML="▶"
}
}

audio.ontimeupdate = () => {
const percent = (audio.currentTime / audio.duration) * 100
progress.style.width = percent + "%"
}

</script>

</body>
</html>
