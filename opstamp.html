<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
}

/* CONTAINER */
.stamp-reveal-container {
    width: 220px;
    aspect-ratio: 236 / 327;
    position: relative;
    perspective: 1200px;
    cursor: pointer;
}

/* BASE IMAGE */
.base {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}

/* STICKER WRAPPER */
.sticker {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 2;
}

/* STATIC PART */
.sticker-main {
    position: absolute;
    inset: 0;
    overflow: hidden;
}

/* FLAP (THE MAGIC) */
.flap {
    position: absolute;
    inset: 0;
    transform-origin: top left;
    transition: transform 0.8s cubic-bezier(.65,.05,.36,1),
                filter 0.6s ease;
}

/* IMAGE INSIDE */
.sticker img,
.flap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
}

/* SHADOW + DEPTH */
.flap {
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.3));
}

/* CURL LIGHT */
.flap::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        135deg,
        rgba(255,255,255,0.5) 0%,
        rgba(255,255,255,0.2) 20%,
        transparent 40%
    );
    opacity: 0;
    transition: opacity 0.3s ease;
}

/* PEELED STATE */
.stamp-reveal-container.peeled .flap {
    transform: rotate(-40deg) translate(-40%, -40%) scale(0.95);
    filter: drop-shadow(0 20px 25px rgba(0,0,0,0.5));
}

.stamp-reveal-container.peeled .flap::after {
    opacity: 1;
}

/* OPTIONAL: slight dim on stuck part */
.stamp-reveal-container.peeled .sticker-main {
    filter: brightness(0.9);
}
</style>
</head>

<body>

<div class="stamp-reveal-container" onclick="this.classList.toggle('peeled')">

    <!-- revealed image -->
    <img src="https://i.ibb.co/G4811wMq/66-SABO.png" class="base">

    <!-- sticker -->
    <div class="sticker">
        <div class="sticker-main">
            <img src="https://i.ibb.co/nxG3gx0/66-CHOPPER.png">
        </div>

        <!-- peel flap -->
        <div class="flap">
            <img src="https://i.ibb.co/nxG3gx0/66-CHOPPER.png">
        </div>
    </div>

</div>

</body>
</html>
