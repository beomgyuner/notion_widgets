<!DOCTYPE html>
<html>
<head>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 236px;
  height: 327px;
  overflow: hidden;
}

/* FRAME (fixed embed size) */
.frame {
  width: 236px;
  height: 327px;
  position: relative;
  overflow: hidden;
}

/* STICKER BASE */
.sticker {
  width: 100%;
  height: 100%;
  position: relative;
  cursor: pointer;
  perspective: 1000px;
}

/* LAYERS */
.layer {
  position: absolute;
  inset: 0;
  border-radius: 10px;
}

/* REVEALED IMAGE */
.bottom {
  background: url("https://i.ibb.co/G4811wMq/66-SABO.png") center/cover no-repeat;
  z-index: 1;
}

/* TOP STICKER */
.top {
  background: url("https://i.ibb.co/nxG3gx0/66-CHOPPER.png") center/cover no-repeat;
  z-index: 2;

  transform-origin: top left;
  transition:
    transform 0.8s cubic-bezier(.22,1,.36,1),
    filter 0.4s ease,
    opacity 0.5s ease;

  box-shadow:
    0 6px 12px rgba(0,0,0,0.25),
    inset 0 0 0 1px rgba(255,255,255,0.2);
}

/* LIGHT CURL EFFECT */
.top::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.35), transparent 45%);
  opacity: 0;
  transition: opacity 0.4s ease;
}

/* PEELED STATE */
.sticker.peeled .top {
  transform: rotate(-38deg) translate(-45%, -45%) scale(0.92);
  filter: brightness(1.1);
  opacity: 0;
  box-shadow:
    0 18px 25px rgba(0,0,0,0.45);
}

/* highlight during peel */
.sticker.peeled .top::after {
  opacity: 1;
}

/* subtle adhesive depth on bottom */
.bottom::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.25);
  pointer-events: none;
}
</style>
</head>

<body>

<div class="frame">
  <div class="sticker" onclick="this.classList.toggle('peeled')">
    
    <div class="layer bottom"></div>
    <div class="layer top"></div>

  </div>
</div>

</body>
</html>
