<!DOCTYPE html>
<html>
<head>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
}

/* Container adds perspective */
.stamp-reveal-container {
    width: 212px;
    aspect-ratio: 236 / 327;
    position: relative;
    cursor: pointer;
    perspective: 1000px; /* IMPORTANT */
}

/* Base stamp styles */
.stamp {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    object-fit: contain;
    backface-visibility: hidden;
}

/* Bottom image */
#revealStamp {
    z-index: 1;
}

/* Top stamp (the one peeling) */
#topStamp {
    z-index: 2;
    transform-origin: top left; /* peel from corner */
    transition: transform 0.8s cubic-bezier(.4,0,.2,1), 
                opacity 0.6s ease;
}

/* Peeled state */
.stamp-reveal-container.peeled #topStamp {
    transform: rotateX(65deg) rotateY(-45deg) translate(-40%, -40%);
    opacity: 0;
}
</style>
</head>

<body>

<div class="stamp-reveal-container" onclick="this.classList.toggle('peeled')">

    <img src="https://i.ibb.co/5gD9SsM1/66-SABO.png" id="revealStamp" class="stamp">

    <img src="https://i.ibb.co/G347jtPV/66-CHOPPER.jpg" id="topStamp" class="stamp">

</div>

</body>
</html>
