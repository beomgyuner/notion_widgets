<!DOCTYPE html>
<html>
<head>
<style>
html, body {
    margin: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
}

/* CONTAINER */
.stamp-reveal-container {
    width: 220px;
    aspect-ratio: 236 / 327;
    position: relative;
    cursor: pointer;
    perspective: 1000px; /* needed for 3D peel */
}

/* BASE IMAGE */
.stamp {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* BOTTOM (revealed) */
#revealStamp {
    z-index: 1;
}

/* TOP STICKER */
#topStamp {
    z-index: 2;
    transform-origin: top left;
    transition: transform 0.8s cubic-bezier(.65,.05,.36,1), 
                filter 0.8s ease,
                opacity 0.5s ease;
    
    /* subtle depth */
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
}

/* CURL EFFECT (pseudo element) */
#topStamp::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top left, rgba(255,255,255,0.4), transparent 60%);
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
}

/* PEELED STATE */
.stamp-reveal-container.peeled #topStamp {
    transform: rotate(-35deg) translate(-40%, -40%) scale(0.9);
    filter: drop-shadow(0 15px 20px rgba(0,0,0,0.5));
    opacity: 0;
}

.stamp-reveal-container.peeled #topStamp::after {
    opacity: 1;
}
</style>
</head>

<body>

<div class="stamp-reveal-container" onclick="this.classList.toggle('peeled')">

    <img src="https://i.ibb.co/5gD9SsM1/66-SABO.png" id="revealStamp" class="stamp">

    <img src="https://i.ibb.co/G347jtPV/66-CHOPPER.jpg" id="topStamp" class="stamp">

</div>

</body>
</html>
