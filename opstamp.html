<!DOCTYPE html>
<html>
<head>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
    overflow: hidden;
    font-family: sans-serif;
}

/* CONTAINER (fixed exact size) */
.stamp-reveal-container {
    width: 236px;
    height: 327px;
    position: relative;
    cursor: pointer;
    overflow: hidden;
}

/* IMAGES */
.stamp {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    object-fit: contain;
}

/* BOTTOM IMAGE */
#revealStamp {
    z-index: 1;
}

/* TOP STICKER */
#topStamp {
    z-index: 2;
    transform-origin: bottom right;
    transition:
        transform 0.8s cubic-bezier(.25,.8,.25,1),
        opacity 0.4s ease;
}

/* ✨ PEEL EFFECT */
.stamp-reveal-container.peeled #topStamp {
    transform:
        rotate(-25deg)
        translate(120%, 120%)
        scale(0.85);
    opacity: 0;
}

/* SUBTLE SHADOW FOR DEPTH */
#topStamp::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    opacity: 0;
    transition: opacity 0.4s ease;
}

.stamp-reveal-container:hover #topStamp::after {
    opacity: 1;
}

/* OPTIONAL PROMPT */
.peel-prompt {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    font-size: 11px;
    color: rgba(255,255,255,0.75);
    background: rgba(0,0,0,0.45);
    padding: 3px 8px;
    border-radius: 5px;
    transition: opacity 0.3s;
    pointer-events: none;
}

.stamp-reveal-container.peeled .peel-prompt {
    opacity: 0;
}
</style>
</head>

<body>

<div id="stickers">
    <div class="stamp-reveal-container sticker">

        <img src="https://i.ibb.co/G4811wMq/66-SABO.png" id="revealStamp" class="stamp">

        <img src="https://i.ibb.co/nxG3gx0/66-CHOPPER.png" id="topStamp" class="stamp">

        <div class="peel-prompt">tap / click</div>
    </div>
</div>

<script>
const stickers = document.querySelector('#stickers');
const sticker  = stickers.querySelectorAll('.sticker');

if ('ontouchstart' in window) {

  stickers.classList.add('touch');

  for (var i = 0; i < sticker.length; i++) {
    sticker[i].onclick = function() {
      for (var j = 0; j < sticker.length; j++) {
        sticker[j].classList.remove('peeled');
      }
      this.classList.add('peeled');
    };
  }

} else {

  stickers.classList.add('hover');

  for (var i = 0; i < sticker.length; i++) {
    sticker[i].addEventListener('click', function() {
      this.classList.toggle('peeled');
    });
  }

}
</script>

</body>
</html>
