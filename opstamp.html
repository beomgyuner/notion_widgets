<!DOCTYPE html>
<html>
<head>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            overflow: hidden;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        .stamp-reveal-container {
            width: 90%;
            max-width: 212px; 

            aspect-ratio: 236 / 327;

            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .stamp {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: contain; 
            transition: all 0.7s ease-in-out;
            pointer-events: none;
        }

        #revealStamp {
            z-index: 1;
        }


        #topStamp {
            z-index: 2;
            opacity: 1;
            transform: scale(1) translate(0%, 0%);
            transform-origin: top left;
        }


        .stamp-reveal-container.peeled #topStamp {
            opacity: 0;
            transform: scale(0) translate(100%, 100%);
            pointer-events: none; 
        }

        /* Optional: Add a subtle text prompt */
        .peel-prompt {
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.7);
            background-color: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .stamp-reveal-container.peeled .peel-prompt {
            opacity: 0; 
        }

    </style>
</head>
<body>

    <div class="stamp-reveal-container" onclick="this.classList.toggle('peeled')">

        <img src="https://i.ibb.co/5gD9SsM1/66-SABO.png" id="revealStamp" class="stamp">

        <img src="https://i.ibb.co/G347jtPV/66-CHOPPER.jpg" id="topStamp" class="stamp">

    </div>

</body>
</html>
