<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunghoon Photo Widget</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:sans-serif;
}

/* widget container */
.widget{
  position:relative;
  width:240px;
}

/* header image */
.header{
  width:100%;
  display:block;
  margin-bottom:6px;
}

/* photo frame area */
.frame{
  position:relative;
  width:240px;
  height:180px; /* 4:3 ratio */
  overflow:hidden;
}

/* the actual photo */
.photo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* frame gifs */
.frame-top,
.frame-bottom{
  position:absolute;
  width:100%;
  left:0;
  pointer-events:none;
  z-index:3;
}

.frame-top{
  top:0;
}

.frame-bottom{
  bottom:0;
}
</style>
</head>

<body>

<div class="widget">

<img class="header"
src="https://64.media.tumblr.com/7db04bc4003e44c884224772749fa708/7ed4ae5a606fafe8-5c/s250x400/0693151f1ff0ebc01e1dfdc4344f0ce851ae27c1.gifv">

<div class="frame">

<img id="sunghoonPhoto" class="photo">

<img class="frame-top"
src="https://64.media.tumblr.com/63c7cca3c254ec2b7b495958a4811720/3bb784667025b9cc-bc/s250x400/a95e8181fadf0316836e820bc1691c4cf3b91281.gifv">

<img class="frame-bottom"
src="https://64.media.tumblr.com/a9e3bd8731c397fc7193184a099562e7/3bb784667025b9cc-9c/s250x400/3ff0dacb4584fed96b7b2c8d872cd1f0357daea7.gifv">

</div>
</div>

<script>

/* Sunghoon photo collection
You can add/remove links here */
const photos = [

"https://i.pinimg.com/736x/4a/44/ef/4a44ef7c3dca3c2f28cb3d40b1e9e1d5.jpg",
"https://i.pinimg.com/736x/da/9b/5c/da9b5c8c44e4c4b6c0edc64c6c0d0b33.jpg",
"https://i.pinimg.com/736x/b8/57/9a/b8579a3c7a9a12dc0c7c3df6c8e9dcb6.jpg",
"https://i.pinimg.com/736x/65/f7/3f/65f73f6b2a2a87c3db6d37e8c4e56c0a.jpg",
"https://i.pinimg.com/736x/2e/9d/4b/2e9d4b09a6d72b48c98d6b0f49d2c3c1.jpg",
"https://i.pinimg.com/736x/6c/51/3d/6c513d9f2a1c2c5b0d1e3d4b7f0a9b0a.jpg"

];

/* choose random image */
const randomPhoto = photos[Math.floor(Math.random()*photos.length)];

document.getElementById("sunghoonPhoto").src = randomPhoto;

</script>

</body>
</html>
