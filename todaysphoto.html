<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunghoon Photo Widget</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:sans-serif;
}

/* widget container */
.widget{
  position:relative;
  width:240px;
}

/* header image */
.header{
  width:100%;
  display:block;
  margin-bottom:6px;
}

/* photo frame area */
.frame{
  position:relative;
  width:240px;
  height:300px; 
  overflow:hidden;
}

/* the actual photo */
.photo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* frame gifs */
.frame-top,
.frame-bottom{
  position:absolute;
  width:100%;
  left:0;
  pointer-events:none;
  z-index:3;
}

.frame-top{
  top:0;
}

.frame-bottom{
  bottom:0;
}
</style>
</head>

<body>

<div class="widget">

<img class="header"
src="https://64.media.tumblr.com/45a959dce75974c612d10533fd3557bb/9f869bfe06bf5bf6-f6/s250x400/b0c3162d1ad52131187e0971f1c67b6b8ff5b004.gifv">

<div class="frame">

<img id="sunghoonPhoto" class="photo">

<img class="frame-top"
src="https://64.media.tumblr.com/81d4d0a931fa81de9a90ca5b7ed14113/e0d5a737e0b21eb0-0a/s250x400/be29dbbd8bf13b104af3e698d53b02dea6be4776.gifv">

<img class="frame-bottom"
src="https://64.media.tumblr.com/f414451aee9746fc35e512bab99304cc/e0d5a737e0b21eb0-7f/s250x400/d865e24424a510bcb26c342d140e2edd6fce561e.gifv">

</div>
</div>

<script>

/* Sunghoon photo collection */
const photos = [

"https://i.pinimg.com/736x/09/83/82/098382a7ee9f35d6cc938267f7f43a7d.jpg",
"https://i.pinimg.com/1200x/7d/64/27/7d642719bf3eeb13d36bfc3cdcbc17d1.jpg",
"https://i.pinimg.com/736x/77/b6/64/77b664466524ad97059d40560da5b440.jpg",
"https://i.pinimg.com/1200x/fe/86/dd/fe86ddd45ac4a03914440c1bf042081a.jpg",
"https://i.pinimg.com/1200x/1e/06/c0/1e06c00de479be9932826b002dc6f5f2.jpg",
"https://i.pinimg.com/736x/59/64/15/596415c74b218637396862bbe7dfd828.jpg"

];

/* choose random image */
const randomPhoto = photos[Math.floor(Math.random()*photos.length)];

document.getElementById("sunghoonPhoto").src = randomPhoto;

</script>

</body>
</html>
