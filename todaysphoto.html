<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunghoon Photo Widget</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:sans-serif;
}

/* widget container */
.widget{
  position:relative;
  width:240px;
}

/* header image */
.header{
  width:100%;
  display:block;
  margin-bottom:6px;
}

/* photo frame area */
.frame{
  position:relative;
  width:180px;
  height:240px; /* 4:3 ratio */
  overflow:hidden;
}

/* the actual photo */
.photo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* frame gifs */
.frame-top,
.frame-bottom{
  position:absolute;
  width:100%;
  left:0;
  pointer-events:none;
  z-index:3;
}

.frame-top{
  top:0;
}

.frame-bottom{
  bottom:0;
}
</style>
</head>

<body>

<div class="widget">

<img class="header"
src="https://pixelsafari.neocities.org/text/texttodaysphoto.gif">

<div class="frame">

<img id="sunghoonPhoto" class="photo">

<img class="frame-top"
src="https://64.media.tumblr.com/63c7cca3c254ec2b7b495958a4811720/3bb784667025b9cc-bc/s250x400/a95e8181fadf0316836e820bc1691c4cf3b91281.gifv">

<img class="frame-bottom"
src="https://64.media.tumblr.com/a9e3bd8731c397fc7193184a099562e7/3bb784667025b9cc-9c/s250x400/3ff0dacb4584fed96b7b2c8d872cd1f0357daea7.gifv">

</div>
</div>

<script>

/* Sunghoon photo collection */
const photos = [

"https://i.pinimg.com/736x/09/83/82/098382a7ee9f35d6cc938267f7f43a7d.jpg",
"https://i.pinimg.com/1200x/7d/64/27/7d642719bf3eeb13d36bfc3cdcbc17d1.jpg",
"https://i.pinimg.com/736x/77/b6/64/77b664466524ad97059d40560da5b440.jpg",
"https://i.pinimg.com/1200x/fe/86/dd/fe86ddd45ac4a03914440c1bf042081a.jpg",
"https://i.pinimg.com/1200x/1e/06/c0/1e06c00de479be9932826b002dc6f5f2.jpg",
"https://i.pinimg.com/736x/59/64/15/596415c74b218637396862bbe7dfd828.jpg"

];

/* choose random image */
const randomPhoto = photos[Math.floor(Math.random()*photos.length)];

document.getElementById("sunghoonPhoto").src = randomPhoto;

</script>

</body>
</html>
