<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sunghoon Photo Widget</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:transparent;
  font-family:sans-serif;
}

/* widget container */
.widget{
  position:relative;
  width:192px;
}

/* header image */
.header{
  width:100%;
  display:block;
  margin-bottom:6px;
}

/* photo frame area */
.frame{
  position:relative;
  width:192px;
  height:240px; 
  overflow:hidden;
}

/* the actual photo */
.photo{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
}

/* frame gifs */
.frame-top,
.frame-bottom{
  position:absolute;
  width:100%;
  left:0;
  pointer-events:none;
  z-index:3;
}

.frame-top{
  top:0;
}

.frame-bottom{
  bottom:0;
}
</style>
</head>

<body>

<div class="widget">

<img class="header"
src="https://64.media.tumblr.com/c36594c77b6048debc57c3c2f4c30d04/9f869bfe06bf5bf6-90/s250x400/20c8cf910f054dabdec75de3a13c04d48c5e09a0.gifv">

<div class="frame">

<img id="sunghoonPhoto" class="photo">

<img class="frame-top"
src="https://64.media.tumblr.com/b4d3755fc8a77923941e3c2a0d86fd31/39261b17b1497e1f-ef/s250x400/61f7cd4a89ea07bbc26af9cb566d69ac0a736618.gifv">

<img class="frame-bottom"
src="https://64.media.tumblr.com/1347246fb888e7396c39a8f0ef446b09/51c3c73a70b2f95d-d7/s250x400/67bfefdd723b0ddd0994f0eb7cdf907248a604ce.gifv">

</div>
</div>

<script>

/* Sunghoon photo collection */
const photos = [

"https://i.pinimg.com/736x/09/83/82/098382a7ee9f35d6cc938267f7f43a7d.jpg",
"https://i.pinimg.com/1200x/7d/64/27/7d642719bf3eeb13d36bfc3cdcbc17d1.jpg",
"https://i.pinimg.com/736x/77/b6/64/77b664466524ad97059d40560da5b440.jpg",
"https://i.pinimg.com/1200x/fe/86/dd/fe86ddd45ac4a03914440c1bf042081a.jpg",
"https://i.pinimg.com/1200x/1e/06/c0/1e06c00de479be9932826b002dc6f5f2.jpg",
"https://i.pinimg.com/736x/59/64/15/596415c74b218637396862bbe7dfd828.jpg",
"https://i.pinimg.com/1200x/d3/61/83/d36183b866d0465ef458d6f694c383f6.jpg",
"https://i.pinimg.com/1200x/d5/54/df/d554dfb8574db513d316b1f442196f7e.jpg",
"https://i.pinimg.com/736x/99/41/c5/9941c52cac65cb17f5c2726ffe6707da.jpg",
"https://i.pinimg.com/736x/d5/11/ba/d511bad7877bbdd0ffdae027be415bfd.jpg",
"https://i.pinimg.com/1200x/d4/d5/fa/d4d5faf41c966424e147d05f22de0daf.jpg",
"https://i.pinimg.com/1200x/11/dc/d3/11dcd39be4b0ab372719c36d453c83cf.jpg"

];

/* choose random image */
const randomPhoto = photos[Math.floor(Math.random()*photos.length)];

document.getElementById("sunghoonPhoto").src = randomPhoto;

</script>

</body>
</html>
