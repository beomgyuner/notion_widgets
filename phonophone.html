<head>
  <meta charset="UTF-8">
  <title>1899</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      display: block;
      margin: auto;
      cursor: pointer;
      position:relative;
      top:0px;
      left:5px;
      display:flex;
      z-index:99;
    }
  </style>
</head>

<body>

<img src="https://file.garden/aXTkw7hiK3vn4ais/661bddcb38a6557abd516c70-vintage-gramophone-with-brass-horn.png" onclick="togglePlayPause()">

<audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/IVE%20(%EC%95%84%EC%9D%B4%EB%B8%8C)%20'Bang%20Bang'%20(Color%20Coded%20Lyrics).mp3" preload="auto"></audio>

<script>
  var audio = document.getElementById('music');

  function togglePlayPause() {
    if (audio.paused) {
      audio.play().catch(err => console.log("play failed:", err));
    } else {
      audio.pause();
    }
  }
</script>

</body>
