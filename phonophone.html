<script>
  const box = document.getElementById("typebox");

   let typing = false;

    function typeText(text, speed = 50) {
    	if (typing) return; 
    	typing = true;

    	box.innerHTML = "";
    	let i = 0;

    	function type() {
	    	if (i < text.length) {
		  	box.innerHTML += text.charAt(i);
		  	i++;
		  	setTimeout(type, speed);
	   	} else {
		  	typing = false;
	  	}
  	}

  	type();
  }

function togglePlayPause() {
	var audio = document.getElementById('music');

	if (audio.paused) {
		audio.play().catch(err => console.log(err));
		typeText("now playing: main theme of final fantasy vii");
	} else {
		audio.pause();
		typeText("not interested?");
	}
}
</script>
