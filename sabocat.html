<!DOCTYPE html>
<html>
<head>
    <style>
    /* 1. This centers the 171px box on the actual screen */
    html {
        display: flex;
        justify-content: center;
        background-color: transparent; 
        height: 100%;
    }

    body {
        margin: 0;
        padding: 0;
        /* 2. Your specific section size */
        width: 171px;
        height: 433px;
        display: flex;
        justify-content: center; /* Centers image horizontally inside the 171px */
        align-items: center;     /* Centers image vertically inside the 433px */
        background-color: transparent; 
        overflow: hidden;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(10px); }
        100% { transform: translateY(0px); }
    }

    .music-toggle {
        width: 150px; 
        cursor: pointer;
        animation: float 4s ease-in-out infinite;
        transition: 0.2s;
    }

    .music-toggle:hover {
        filter: brightness(1.1);
        transform: scale(1.05);
    }
</style>
</head>
<body>

    <img src="https://file.garden/aXTkw7hiK3vn4ais/mov51073_0.png" 
         alt="Play Music" 
         class="music-toggle"
         onclick="togglePlayPause()">

    <audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/ChopperLuffy%20-%20Dr.%20Tony%20Tony%20Chopper.mp3" preload="auto"></audio>

    <script>
        function togglePlayPause() {
            var audio = document.getElementById('music');
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
