<!DOCTYPE html>
<html>
<head>
    <style>
        /* You NEED this CSS or the "animation: float" part of your code won't do anything! */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
            100% { transform: translateY(0px); }
        }

        body {
            background-color: #f4dffc; /* Adding a background so you can see the image */
            margin: 0;
            height: 100vh;
        }
    </style>
</head>
<body>

    <img src="https://file.garden/aXTkw7hiK3vn4ais/mov51073_0.png" 
         alt="Play Music" 
         onclick="togglePlayPause()" 
         style="cursor: pointer; position: fixed; width: 180px; right: 20px; top: 50px; z-index: 9999; animation: float 4s ease-in-out infinite;">

    <audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/ChopperLuffy%20-%20Dr.%20Tony%20Tony%20Chopper.mp3" preload="auto"></audio>

    <script>
        function togglePlayPause() {
            var audio = document.getElementById('music');
            if (audio.paused) {
                audio.play();
                console.log("Music is playing!");
            } else {
                audio.pause();
                console.log("Music is paused!");
            }
        }
    </script>

</body>
</html>
