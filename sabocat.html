<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* 1. Force the body to match your section size */
            width: 171px;
            height: 433px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent; /* Changed to transparent so it blends in */
            overflow: hidden;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(10px); } /* Reduced movement for small space */
            100% { transform: translateY(0px); }
        }

        .music-toggle {
            /* 2. Shrink the image to fit inside 171px width */
            /* We use 150px to leave a little breathing room on the sides */
            width: 150px; 
            cursor: pointer;
            animation: float 4s ease-in-out infinite;
            transition: 0.2s;
        }

        .music-toggle:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <img src="https://file.garden/aXTkw7hiK3vn4ais/mov51073_0.png" 
         alt="Play Music" 
         class="music-toggle"
         onclick="togglePlayPause()">

    <audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/ChopperLuffy%20-%20Dr.%20Tony%20Tony%20Chopper.mp3" preload="auto"></audio>

    <script>
        function togglePlayPause() {
            var audio = document.getElementById('music');
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
