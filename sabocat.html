<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. The Container (The Body) */
        body {
            margin: 0;
            padding: 0;
            height: 100vh; /* Takes up full screen height */
            display: flex; /* Activates Flexbox */
            justify-content: center; /* Centers horizontally */
            align-items: center; /* Centers vertically */
            background-color: #fff;
            overflow: hidden;
        }

        /* 2. The Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(15px); }
            100% { transform: translateY(0px); }
        }

        /* 3. The Image Styling */
        .music-toggle {
            width: 250px; /* Made it a bit bigger for a center-piece */
            cursor: pointer;
            transition: transform 0.2s ease;
            animation: float 4s ease-in-out infinite;
        }

        .music-toggle:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <img src="https://file.garden/aXTkw7hiK3vn4ais/mov51073_0.png" 
         alt="Play Music" 
         class="music-toggle"
         onclick="togglePlayPause()">

    <audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/ChopperLuffy%20-%20Dr.%20Tony%20Tony%20Chopper.mp3" preload="auto"></audio>

    <script>
        function togglePlayPause() {
            var audio = document.getElementById('music');
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
