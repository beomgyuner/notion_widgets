<!DOCTYPE html>
<html>
<head>
    <style>
        /* 1. Make the background and container fill whatever size Notion's block is */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            overflow: hidden; /* Prevents scrollbars in Notion */
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(0px); }
        }

        .music-toggle {
            /* 2. Tell the image to be 90% of the width of the Notion block */
            /* This ensures it never "overflows" or looks too big */
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            cursor: pointer;
            animation: float 4s ease-in-out infinite;
            transition: 0.2s;
        }

        .music-toggle:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <img src="https://file.garden/aXTkw7hiK3vn4ais/mov51073_0.png" 
         alt="Play Music" 
         class="music-toggle"
         onclick="togglePlayPause()">

    <audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/ChopperLuffy%20-%20Dr.%20Tony%20Tony%20Chopper.mp3" preload="auto"></audio>

    <script>
        function togglePlayPause() {
            var audio = document.getElementById('music');
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }
    </script>

</body>
</html>
