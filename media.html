<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Media Logger</title>

<style>

/* ===================== ROOT ===================== */
:root{
  --text:#7a4e6b;
  --pink:#ffb0c9;
  --blue:#74a2c6;
  --border:#D1B9B3;
  --bg:#fff7fa;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:'MS PGothic',sans-serif;
  color:var(--text);
  background-image:url('http://media.tumblr.com/tumblr_me41pmqQhe1r52dl9.gif');
  background-size:50px;
}

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(to bottom,#ffffffcc,#ffb0c9cc);
  border:1px solid var(--pink);
  border-radius:8px;
}

::-webkit-scrollbar-track{
  background:#fff0f5;
  border:1px solid var(--pink);
}

/* ===================== FONTS ===================== */
@font-face {
  font-family:'Cavalhatriz';
  src:url('https://file.garden/aXTkw7hiK3vn4ais/Cavalhatriz.ttf') format('truetype');
}

@font-face {
  font-family:'Compagnon-Bold';
  src:url('https://humantooth.neocities.org/fonts/Compagnon-Bold.woff') format('woff');
}

/* ===================== MAIN ===================== */
.container-wrap{
  max-width:1200px;
  margin:auto;
  padding:6px;
  background:white;
  border-radius:8px;
  border-width:8px;
  border-style:solid;
  border-image:url("https://static.tumblr.com/yn7vk7p/DfHmp40xm/bo-ha26.gif") 8 fill round;
}

.container{
  background:var(--bg);
  border:3px solid white;
  outline:1px solid var(--border);
  outline-offset:4px;
  border-radius:5px;
  padding:8px;
}

/* ===================== HEADER ===================== */
header{
  height:170px;
  position:relative;
  border-radius:5px;
  overflow:hidden;
  margin-bottom:10px;
  border:1px solid var(--border);
  background:url('https://pbs.twimg.com/media/G3W5MIMboAAFz3X?format=jpg&name=large');
  background-size:cover;
}

header::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#ffb0c9b0,transparent);
}

header h1{
  position:absolute;
  bottom:10px;
  right:20px;
  z-index:2;
  margin:0;
  font-family:'Cavalhatriz';
  font-size:3rem;
  color:white;
  font-weight:normal;
  text-shadow:
    0 0 4px #FFB0C9,
    0 0 8px #FFB0C9,
    0 0 12px #FFB0C9;
}

/* ===================== BOX ===================== */
.section{
  background:white;
  border:3px solid white;
  outline:1px solid var(--border);
  border-radius:5px;
  margin-bottom:14px;
  overflow:hidden;
}

.section-title{
  background-image:url('https://pbs.twimg.com/media/G3W5MIMboAAFz3X?format=jpg&name=large');
  background-size:250px;
  color:white;
  font-family:'Compagnon-Bold';
  padding:9px 12px;
  font-size:20px;
  text-shadow:
    0 0 4px #FFB0C9,
    0 0 8px #FFB0C9;
}

.section-content{
  padding:12px;
}

/* ===================== GRID ===================== */
.media-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:12px;
}

/* ===================== CARD ===================== */
.card{
  background:#fffafb;
  border:1px solid var(--pink);
  border-radius:6px;
  overflow:hidden;
  box-shadow:2px 2px 0px #ffd3e1;
}

.card img{
  width:100%;
  height:310px;
  object-fit:cover;
  display:block;
}

.card-body{
  padding:10px;
}

.card h3{
  margin:0 0 6px;
  color:var(--blue);
  font-size:17px;
}

.meta{
  font-size:12px;
  color:#b87c93;
  margin-bottom:8px;
}

.review{
  font-size:13px;
  line-height:1.4;
}

.rating{
  margin-top:10px;
  color:#ff8db2;
  letter-spacing:2px;
}

.tag{
  display:inline-block;
  background:#ffe5ef;
  border:1px solid var(--pink);
  padding:2px 7px;
  border-radius:999px;
  font-size:11px;
  margin-bottom:6px;
}

/* ===================== EMPTY STATE ===================== */
.empty{
  border:2px dashed #ffc1d6;
  border-radius:6px;
  padding:30px;
  text-align:center;
  color:#c792aa;
  background:#fffafb;
  font-size:14px;
}

/* ===================== FOOTER ===================== */
footer{
  text-align:center;
  font-size:12px;
  color:#c98aa1;
  margin-top:8px;
}

<!-- ===================== MOVIES ===================== -->
<section class="section">

  <div class="section-title">
    MOVIES
  </div>

  <div class="section-content">

    <div class="media-grid">

      <!-- TEMPLATE CARD -->

      <div class="empty">

    </div>

  </div>

</section>

<!-- ===================== ANIME ===================== -->
<section class="section">

  <div class="section-title">
    ANIME
  </div>

  <div class="section-content">

    <div class="media-grid">

      <div class="empty">
        no anime entries yet ♡
      </div>

    </div>

  </div>

</section>

<!-- ===================== SHOWS ===================== -->
<section class="section">

  <div class="section-title">
    SHOWS
  </div>

  <div class="section-content">

    <div class="media-grid">

      <div class="empty">
        no show entries yet ♡

    </div>

  </div>

</section>

<!-- ===================== GAMES ===================== -->
<section class="section">

  <div class="section-title">
    GAMES
  </div>

  <div class="section-content">

    <div class="media-grid">

      <div class="empty">

      </div>

    </div>

  </div>

</section>

<!-- ===================== MANGA ===================== -->
<section class="section">

  <div class="section-title">
    MANGA
  </div>

  <div class="section-content">

    <div class="media-grid">

      <div class="empty">

      </div>

    </div>

  </div>

</section>

<footer>
  edit entries directly in the html file ♡
</footer>

</div>
</div>

</body>
</html>
