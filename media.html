<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Media Logger</title>

<style>

/* ===================== ROOT ===================== */

:root{
  --text:#7a4e6b;
  --pink:#ffb0c9;
  --blue:#74a2c6;
  --border:#D1B9B3;
  --bg:#fff7fa;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding:20px;
  font-family:'MS PGothic',sans-serif;
  color:var(--text);

  background-image:url('http://media.tumblr.com/tumblr_me41pmqQhe1r52dl9.gif');
  background-size:50px 50px;
}

/* ===================== SCROLLBAR ===================== */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(to bottom,#ffffffcc,#ffb0c9cc);
  border:1px solid var(--pink);
  border-radius:8px;
}

::-webkit-scrollbar-track{
  background:#fff0f6;
  border:1px solid var(--pink);
}

/* ===================== FONTS ===================== */

@font-face {
  font-family:'Cavalhatriz';
  src:url('https://file.garden/aXTkw7hiK3vn4ais/Cavalhatriz.ttf') format('truetype');
}

@font-face {
  font-family:'Compagnon-Bold';
  src:url('https://humantooth.neocities.org/fonts/Compagnon-Bold.woff') format('woff');
}

/* ===================== CONTAINER ===================== */

.container-wrap{
  max-width:1200px;
  margin:auto;

  padding:6px;

  background:white;

  border-radius:8px;

  border-width:8px;
  border-style:solid;
  border-image:url("https://static.tumblr.com/yn7vk7p/DfHmp40xm/bo-ha26.gif") 8 fill round;
}

.container{
  display:flex;
  flex-wrap:wrap;
  gap:8px;

  background:var(--bg);

  padding:8px;

  border-radius:5px;

  border:3px solid white;
  outline:1px solid var(--border);
  outline-offset:4px;
}

/* ===================== HEADER ===================== */

header{
  width:100%;
  height:180px;

  position:relative;

  border-radius:5px;
  overflow:hidden;

  border:1px solid var(--border);

  background-image:url('https://pbs.twimg.com/media/G3W5MIMboAAFz3X?format=jpg&name=large');
  background-size:cover;
  background-position:center;
}

header::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#ffb0c9aa,transparent);
}

header h1{
  position:absolute;
  bottom:10px;
  right:18px;
  z-index:2;

  margin:0;

  color:white;

  font-family:'Cavalhatriz';
  font-size:3rem;
  font-weight:normal;

  text-shadow:
    0 0 4px #FFB0C9,
    0 0 8px #FFB0C9,
    0 0 12px #FFB0C9;
}

/* ===================== SIDEBAR ===================== */

.sidebar{
  flex:1 1 260px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.main{
  flex:1 1 850px;
}

/* ===================== BOX ===================== */

.box{
  background:white;

  border-radius:5px;

  border:3px solid white;
  outline:1px solid var(--border);

  overflow:hidden;
}

.box-title{
  background-image:url('https://pbs.twimg.com/media/G3W5MIMboAAFz3X?format=jpg&name=large');
  background-size:250px;

  color:white;

  padding:8px 10px;

  font-family:'Compagnon-Bold';
  font-size:18px;

  text-shadow:
    0 0 4px #FFB0C9,
    0 0 8px #FFB0C9;
}

.box-content{
  padding:10px;
}

/* ===================== PROFILE ===================== */

.profile{
  text-align:center;
}

.profile img{
  width:120px;
  height:120px;

  object-fit:cover;

  border-radius:100%;

  border:3px solid white;
  outline:1px solid var(--pink);
}

.stats{
  margin-top:10px;
  display:grid;
  gap:6px;
}

.stat{
  background:linear-gradient(#fff7fa,#ffe1ec);

  border:1px solid var(--pink);

  padding:6px;

  border-radius:4px;

  font-size:13px;
}

/* ===================== FORM ===================== */

form{
  display:grid;
  gap:8px;
}

input,
textarea,
select{
  width:100%;

  border:1px solid var(--pink);

  background:#fffafb;

  border-radius:4px;

  padding:8px;

  font-family:inherit;

  color:var(--text);
}

textarea{
  resize:vertical;
  min-height:90px;
}

button{
  border:none;

  background:linear-gradient(to right,#ffd6e6,#ffb0c9);

  color:white;

  padding:10px;

  border-radius:5px;

  font-family:'Compagnon-Bold';

  cursor:pointer;

  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
}

/* ===================== GRID ===================== */

.media-grid{
  display:grid;

  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));

  gap:12px;
}

/* ===================== CARD ===================== */

.card{
  background:#fffafb;

  border:1px solid var(--pink);

  border-radius:6px;

  overflow:hidden;

  box-shadow:2px 2px 0px #ffd3e1;
}

.card img{
  width:100%;
  height:300px;

  object-fit:cover;
}

.card-body{
  padding:10px;
}

.card h3{
  margin:0 0 6px;

  color:var(--blue);

  font-size:18px;
}

.meta{
  font-size:12px;
  color:#b07c93;
}

.review{
  margin-top:8px;
  font-size:13px;
  line-height:1.4;
}

.rating{
  margin-top:10px;
  color:#ff89af;
  letter-spacing:2px;
}

.tag{
  display:inline-block;

  margin-top:6px;

  padding:3px 8px;

  border-radius:999px;

  border:1px solid var(--pink);

  background:#ffe5ef;

  font-size:11px;
}

/* ===================== EMPTY ===================== */

.empty{
  text-align:center;

  padding:60px 20px;

  border:2px dashed var(--pink);

  border-radius:8px;

  background:#fffafb;
}

.empty h2{
  color:var(--blue);
  margin-bottom:5px;
}

/* ===================== DELETE ===================== */

.delete-btn{
  margin-top:10px;

  background:#ffd6e6;

  color:#7a4e6b;

  width:100%;
}

/* ===================== MOBILE ===================== */

@media(max-width:850px){

  .sidebar{
    flex:1 1 100%;
  }

  .main{
    flex:1 1 100%;
  }

  header h1{
    font-size:2.2rem;
  }

}

</style>
</head>

<body>

<div class="container-wrap">
<div class="container">

<header>
  <h1>media logger ♡</h1>
</header>

<!-- ===================== SIDEBAR ===================== -->

<div class="sidebar">

  <div class="box">
    <div class="box-title">PROFILE</div>

    <div class="box-content profile">

      <img src="https://i.pinimg.com/736x/75/6d/53/756d53f0fcbf6c5fd2c0c5a8d4cb7d55.jpg">

      <h3>your media archive ♡</h3>

      <p>
        movies · anime · manga · games · shows
      </p>

      <div class="stats">
        <div class="stat">
          total entries:
          <span id="entryCount">0</span>
        </div>
      </div>

    </div>
  </div>

  <!-- ===================== ADD ENTRY ===================== -->

  <div class="box" id="adminPanel">

    <div class="box-title">
      ADD ENTRY
    </div>

    <div class="box-content">

      <form id="mediaForm">

        <input type="text" id="title" placeholder="title..." required>

        <select id="type">

          <option>Movie</option>
          <option>Anime</option>
          <option>Show</option>
          <option>Manga</option>
          <option>Game</option>

        </select>

        <input type="text" id="image" placeholder="cover image url...">

        <input type="text" id="status" placeholder="completed / watching / playing">

        <input type="number" id="rating" placeholder="rating out of 5" min="1" max="5">

        <textarea id="review" placeholder="thoughts..."></textarea>

        <button type="submit">
          add entry ♡
        </button>

      </form>

    </div>
  </div>

</div>

<!-- ===================== MAIN ===================== -->

<div class="main">

  <div class="box">

    <div class="box-title">
      MEDIA LOG
    </div>

    <div class="box-content">

      <div id="mediaGrid" class="media-grid"></div>

      <div class="empty" id="emptyState">

        <h2>your logger is empty ♡</h2>

        <p>
          add movies, anime, games, manga,
          and shows to start your archive
        </p>

      </div>

    </div>

  </div>

</div>

</div>
</div>

<script>

/* =========================================================
   SETTINGS
========================================================= */

/*
SET THIS TO FALSE
if you don't want visitors adding entries
*/

const ADMIN_MODE = true;

/*
OPTIONAL PASSWORD

leave blank to disable
*/

const ADMIN_PASSWORD = "12345";

/* =========================================================
   ELEMENTS
========================================================= */

const form = document.getElementById("mediaForm");
const mediaGrid = document.getElementById("mediaGrid");
const emptyState = document.getElementById("emptyState");
const entryCount = document.getElementById("entryCount");
const adminPanel = document.getElementById("adminPanel");

/* =========================================================
   ADMIN CHECK
========================================================= */

if(!ADMIN_MODE){

  adminPanel.style.display = "none";

}else if(ADMIN_PASSWORD !== ""){

  const password = prompt("enter admin password:");

  if(password !== ADMIN_PASSWORD){

    adminPanel.style.display = "none";

  }

}

/* =========================================================
   LOAD SAVED ENTRIES
========================================================= */

let entries = JSON.parse(localStorage.getItem("mediaEntries")) || [];

renderEntries();

/* =========================================================
   ADD ENTRY
========================================================= */

form.addEventListener("submit", function(e){

  e.preventDefault();

  const entry = {

    title: document.getElementById("title").value,

    type: document.getElementById("type").value,

    image:
      document.getElementById("image").value ||
      "https://placehold.co/400x600/ffe0ec/7a4e6b?text=No+Image",

    status: document.getElementById("status").value,

    rating: document.getElementById("rating").value,

    review: document.getElementById("review").value

  };

  entries.unshift(entry);

  saveEntries();

  renderEntries();

  form.reset();

});

/* =========================================================
   SAVE
========================================================= */

function saveEntries(){

  localStorage.setItem(
    "mediaEntries",
    JSON.stringify(entries)
  );

}

/* =========================================================
   DELETE
========================================================= */

function deleteEntry(index){

  entries.splice(index,1);

  saveEntries();

  renderEntries();

}

/* =========================================================
   RENDER
========================================================= */

function renderEntries(){

  mediaGrid.innerHTML = "";

  entryCount.textContent = entries.length;

  if(entries.length === 0){

    emptyState.style.display = "block";

  }else{

    emptyState.style.display = "none";

  }

  entries.forEach((entry,index)=>{

    let stars = "";

    for(let i=0;i<5;i++){

      stars += i < entry.rating ? "★" : "☆";

    }

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = `

      <img src="${entry.image}">

      <div class="card-body">

        <h3>${entry.title}</h3>

        <div class="meta">
          ${entry.type} · ${entry.status}
        </div>

        <span class="tag">
          ${entry.type.toLowerCase()}
        </span>

        <div class="review">
          ${entry.review}
        </div>

        <div class="rating">
          ${stars}
        </div>

        ${
          ADMIN_MODE
          ?
          `<button class="delete-btn"
            onclick="deleteEntry(${index})">
            delete
          </button>`
          :
          ""
        }

      </div>

    `;

    mediaGrid.appendChild(card);

  });

}

</script>

</body>
</html>
