<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music PNG Widget</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 583px;
    height: 279px;
    overflow: hidden;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;

    background-image: url('http://media.tumblr.com/tumblr_me41pmqQhe1r52dl9.gif');
    background-size: 200px 200px;
    background-repeat: repeat;
}

.music-container {
    width: 583px;
    height: 279px;

    display: flex;
    justify-content: space-between;
    align-items: center;
    overflow: hidden;
}

.music-button {
    width: 190px;
    height: auto;

    cursor: pointer;
    user-select: none;
    transition: transform 0.2s ease;
}

.music-button:hover {
    transform: scale(1.05);
}

.music-button:hover {
    transform: scale(1.05);
}

.shake {
    animation: shake 0.4s;
}

@keyframes shake {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(-6deg); }
    40% { transform: rotate(6deg); }
    60% { transform: rotate(-4deg); }
    80% { transform: rotate(4deg); }
    100% { transform: rotate(0deg); }
}
</style>
</head>

<body>

<div class="music-container" id="musicContainer">
    <img src="https://file.garden/aVuNE7vWeAh9ZXOJ/tumblr_9801424588d872b984b1fed316f94e3f_4447b598_2048.png" class="music-button">
    <img src="https://file.garden/aVuNE7vWeAh9ZXOJ/image.png" class="music-button">
    <img src="https://file.garden/aVuNE7vWeAh9ZXOJ/tumblr_9801424588d872b984b1fed316f94e3f_4447b598_2048%20(1).png" class="music-button">
</div>

<audio id="music">
    <source src="https://file.garden/aVuNE7vWeAh9ZXOJ/ReDreaming%20Angel%20-%20Angels%20of%20Delusion%20EP%20%20Zenless%20Zone%20Zero.mp3" type="audio/mpeg">
</audio>

<script>
const container = document.getElementById("musicContainer");
const images = document.querySelectorAll(".music-button");
const music = document.getElementById("music");

container.addEventListener("click", () => {

    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }

    images.forEach(img => {
        img.classList.remove("shake");
        void img.offsetWidth;
        img.classList.add("shake");
    });
});
</script>

</body>
</html>
