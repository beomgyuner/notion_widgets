<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "MS PGothic", "Segoe UI", sans-serif;
  }

  .nav-container {
    margin: 0 auto;
    overflow: hidden;
  }

  .nav {
    position: relative;
    display: flex;
    height: 34px;
    background: #fff;
    overflow: hidden;
  }

  .highlight {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 33.333%;
    background: linear-gradient(to right, #ffc9db, #ffffff);
    transition: 0.3s ease;
    z-index: 0;
  }

  .nav a {
    flex: 1;
    text-align: center;
    line-height: 34px;
    text-decoration: none;
    font-size: 13px;
    color: #8a6a9e;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
    cursor: pointer;
  }

  .nav a:not(:last-child)::after {
    content: "";
    position: absolute;
    right: 0;
    top: 7px;
    height: 20px;
    border-right: 3px dotted rgba(110, 14, 54);
  }

  iframe {
  display: block;
  }

  .blinkie-wrapper {
  width: 100%;
  height: 20px;
  overflow: hidden;
  margin-top: 4px;
  }

.blinkie img {
  height: 20px;
  margin: 0 4px;
  image-rendering: pixelated;
  }

</style>
</head>

<body>
  <div class="nav-container">
    <div class="nav" id="nav">
      <div class="highlight" id="highlight"></div>

      <a id="personal">PERSONAL</a>
      <a id="cortis">CORTIS</a>
      <a id="reality">REALITY</a>
    </div>
  </div>

<script>
const links = document.querySelectorAll(".nav a");
const highlight = document.getElementById("highlight");

// default = PERSONAL
let activeIndex = 0;
moveHighlight(activeIndex);

links.forEach((link, index) => {

  // move on hover
  link.addEventListener("mouseenter", () => {
    moveHighlight(index);
  });

  // click = open + set active
  link.addEventListener("click", () => {
    activeIndex = index;
    moveHighlight(index);
    navigate(link.id);
  });
});

// return to active when leaving nav
document.getElementById("nav").addEventListener("mouseleave", () => {
  moveHighlight(activeIndex);
});

function navigate(id) {
  let url = "";

  if (id === 'personal') {
    url = "https://www.notion.so/12082002/wawawa-34daa8b436b680d98807c004977dd4cd";
  }
  else if (id === 'cortis') {
    url = "https://www.notion.so/12082002/cortis-34eaa8b436b680a08689d548aa26c31e";
  }
  else if (id === 'reality') {
    url = "https://www.notion.so/12082002/reality-34eaa8b436b680fb8e62c8fadaff2a46";
  }

  window.open(url, "_top"); // breaks out of Notion iframe
  }
  
}
</script>

</body>
</html>
