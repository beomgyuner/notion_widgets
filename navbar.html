<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "MS PGothic", "Segoe UI", sans-serif;
  }

  .nav-container {
    width: 500px;
    margin: 0 auto;
    overflow: hidden;
  }

  .nav {
    display: flex;
    height: 34px;
    background: #fff;
    overflow: hidden;
  }

  .nav a {
    flex: 1;
    text-align: center;
    line-height: 34px;
    text-decoration: none;
    font-size: 13px;
    color: #8a6a9e;
    letter-spacing: 1px;
    position: relative;
    transition: all 0.2s ease;
  }

  /* dotted separators */
  .nav a:not(:last-child)::after {
    content: "";
    position: absolute;
    right: 0;
    top: 7px;
    height: 20px;
    border-right: 1px dotted rgba(110, 14, 54);
  }

  /* hover = soft highlight */
  .nav a:hover {
    background: rgba(255,255,255,0.35);
  }

  /* active / selected tab */
  .nav a.active {
    background: linear-gradient(to right, #ffc9db, #ffffff);
    color: #6e0e36;
    font-weight: 500;
  }

</style>
</head>

<body>
  <div class="nav-container">
    <div class="nav">
      <a id="personal" on click="navigate(this.id)" class="active">PERSONAL</a>
      <a id="cortis" on click="navigate(this.id)">COLOR OUTSIDE THE LINES</a>
      <a id="reality" on click="navigate(this.id)">REALITY</a>
    </div>
  </div>

  <script>

    let direction = "horizontal";
    if (direction === "vertical") {
      document.head.insertAdjacentHTML ("beforeend", '<style>.nav {display: block; text-align: left; margin:7px} i{width:15px; margin-right:5px} .nav{margin:3px}</
                                        }
    function navigate(id) {

      if (id == 'personal')
        window.open("https://www.notion.so/12082002/wawawa-34daa8b436b680d98807c004977dd4cd", '_blank').focus();

      else if (id == 'cortis')
        window.open("https://www.notion.so/12082002/cortis-34eaa8b436b680a08689d548aa26c31e", '_blank').focus();

      else if (id == 'reality')
        window.open("https://www.notion.so/12082002/reality-34eaa8b436b680fb8e62c8fadaff2a46", '_blank').focus();
    
  </script>
  
</body>
</html>
