<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Record Player</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#fff;
margin:0;
font-family:sans-serif;
}

/* container */
.player{
position:relative;
width:420px;
height:300px;
}

/* player base png */
.player-base{
position:absolute;
width:100%;
left:0;
top:0;
pointer-events:none;
}

/* record disc */
.disc{
position:absolute;
width:300px;
left:60px;
bottom:30px;
}

/* spinning animation */
.spin{
animation:spin 2s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* needle image */
.needle{
position:absolute;
width:190px;
top:10px;
left:250px;

/* anchor point (pivot of tonearm) */
transform-origin:20px 20px;

transform:rotate(-40deg);
cursor:grab;
}

</style>
</head>

<body>

<div class="player">

<img src="https://file.garden/aXTkw7hiK3vn4ais/Client%2BLiaison%2BLP%2BMock%2BUp.webp" id="disc" class="disc">

<img src="https://file.garden/aXTkw7hiK3vn4ais/58e3853c204d556bbd97b151.png" id="needle" class="needle">

</div>

<audio id="music" src="https://file.garden/aXTkw7hiK3vn4ais/Still%20Monster.mp3"></audio>

<script>

const needle = document.getElementById("needle")
const disc = document.getElementById("disc")
const music = document.getElementById("music")

let dragging = false

/* start dragging */
needle.addEventListener("mousedown",()=>{
dragging=true
})

document.addEventListener("mouseup",()=>{
dragging=false
})

/* move needle */
document.addEventListener("mousemove",(e)=>{

if(!dragging) return

let player = document.querySelector(".player")
let rect = player.getBoundingClientRect()

let x = e.clientX - rect.left
let y = e.clientY - rect.top

/* pivot location */
let pivotX = 270
let pivotY = 30

let angle = Math.atan2(y - pivotY, x - pivotX) * 180 / Math.PI

needle.style.transform = `rotate(${angle}deg)`

checkContact()

})

/* check if needle is touching disc */
function checkContact(){

let needleBox = needle.getBoundingClientRect()
let discBox = disc.getBoundingClientRect()

let touching =
needleBox.right > discBox.left &&
needleBox.left < discBox.right &&
needleBox.bottom > discBox.top &&
needleBox.top < discBox.bottom

if(touching){

disc.classList.add("spin")

if(music.paused){
music.play()
}

}else{

disc.classList.remove("spin")
music.pause()

}

}

</script>

</body>
</html>
