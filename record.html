<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Record Player</title>

<style>

*,
*::before,
*::after {
  margin: 0;
	padding: 0;
  box-sizing: border-box;
}
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 200px;
}
img {
  width: 250px;
  height: 165px;
  object-fit: cover;
}
.player {
  position: relative;
  width: 600px;
  height: 600px;
  background: linear-gradient(145deg,#ffd6ec,#e4c7ff); /* pastel pink → lavender */
  border-radius: 100px;
  border-width: 4px 7px 10px 0px;
  border-style: solid;
  border-color: #ffffff;
  box-shadow:
        0 0 25px #ffb6f1, /* glow pink */
        inset 0 0 10px #ffffff;
  overflow: hidden;
}
.player::after {
  content: '';
  position: absolute;
  width: 80%;
  height: 75%;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  border-left: 3px solid #f4a8d8; /* pastel border */
  border-radius: 10px 220px 220px 7px;
  background: linear-gradient(180deg, #ffe0f7 0%, #d9bfff 100%); /* soft gradient */
}
.platter {
  position: relative;
  width: 400px;
  height: 400px;
  left: 9%;
  top: 16%;
  border-radius: 50%;
  background: repeating-radial-gradient(#ffdaf9, #ffdaf9 14%, #ffc1e3 15%); /* pastel concentric */
  border: 10px solid #ffb6f1; /* pink border */
  z-index: 2;
}
.color {
  position: absolute;
  width: 170px;
  height: 170px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: #ffd1e8; /* pink pastel center */
  border: 30px solid #ff8adf; /* darker pink ring */
  z-index: 2;
}
.platter::after {
  content: '';
  position: absolute;
  width: 50px;
  height: 50px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #ffd6ec 100%); /* soft highlight center */
  border: 20px solid #ffb6f1;
  z-index: 2;
}
.shadow {
  position: absolute;
  width: 400px;
  height: 400px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  overflow: hidden;
}
.shadow::after, .shadow::before {
  content: '';
  position: absolute;
  left: -60px;
  top: 0;
  border-style: solid;
  border-color: #ffb6f12e transparent transparent transparent; /* pastel shadow */
  border-width: 200px 260px 0 260px;
}
.shadow::before {
  bottom: 0;
  transform: rotate(180deg);
}
.platter.platter_active {
  animation: platter-play 5s linear infinite;
  animation-delay: 1s;
}
@keyframes platter-play {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}
.controller-wrapper {
  display: inline-block;
  position: relative;
  left: 74%;
  top: -63%;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background-color: #e0cfff; /* lavender pastel */
  border: 8px solid #f3d1f4; /* light pink */
  box-shadow: #f5c2f55d 0px 1px 2px 0px, #f5c2f533 0px 2px 6px 2px;
  transition: all 1s linear;
}
.controller {
  position: absolute;
  width: 80px;
  height: 80px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) rotate(0deg);
  border-radius: 50%;
  background-color: #ffe6f5; /* pale pink */
  border: 3px solid #f4c2f0;
  z-index: 10;
  transition: all 1s linear;
}
.controller::before {
  content: '';
  position: absolute;
  width: 50px;
  height: 50px;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background-color: #ffe6f5;
  border: 8px solid #f3c1f4;
}
.footer {
  position: absolute;
  left: 50%;
  top: -40px;
  transform: translateX(-50%);
  width: 30px;
  height: 30px;
  border-radius: 5px;
  background-color: #ffe6f5;
  border: 3px solid #f4c2f0;
}
.footer::after {
  content: '';
  position: absolute;
  left: 50%;
  top: 26px;
  transform: translateX(-50%);
  width: 15px;
  height: 10px;
  background-color: #ffe6f5;
  border: 2px solid #f4c2f0;
  z-index: 2;
}
.axis {
  position: absolute;
  left: 50%;
  top: 77px;
  transform: translateX(-50%);
  width: 15px;
  height: 200px;
  background-color: #f4c2f0;
  border: 2px solid #e3b4e8;
  border-bottom: transparent;
}
.axis::after {
  content: '';
  position: absolute;
  left: 50%;
  top: -4px;
  transform: translateX(-50%);
  width: 20px;
  height: 30px;
  background-color: #ffe6f5;
  border: 2px solid #f4c2f0;
}
.head {
  position: absolute;
  left: 17px;
  top: 300px;
  width: 40px;
  height: 60px;
  background-color: #ffe6f5;
  border-radius: 5px;
  border: 2px solid #f4c2f0;
}
.head::after {
  content: '';
  position: absolute;
  left: 50%;
  top: -30px;
  transform: translateX(-50%);
  width: 23px;
  height: 30px;
  background-color: #ffe6f5;
  border: 2px solid #f4c2f0;
}
.head::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 20px;
  transform: translateX(-50%);
  width: 40px;
  height: 20px;
  background-color: #f7d0f4;
  filter: blur(1px);
}
.controller.controller_active {
  transform: translate(-50%, -50%) rotate(22deg);
  transition: all 1s linear;
}
.controller.controller_active .head {
  transform: rotate(0deg);
  transform-origin: top;
  animation: controller-move 3s infinite linear;
}
@keyframes controller-move {
  0% { transform: rotate(0deg); }
  30% { transform: rotate(2deg); }
  70% { transform: rotate(-2deg); }
  100% { transform: rotate(0deg); }
}
.volume {
  position: absolute;
  top: 43%;
  right: -50px;
  transform: rotate(-90deg);
}
.volume-range {
  position: relative;
  appearance: none;
  width: 170px;
  height: 10px;
  border-radius: 5px;
  background-color: #f4c2f0;
  box-shadow: #f5c2f55d 0px 1px 2px 0px, #f5c2f533 0px 2px 6px 2px;
  outline: none;
  border: 2px solid #e3b4e8;
}
.volume-range::-webkit-slider-thumb {
  appearance: none;
  width: 18px;
  height: 20px;
  background-color: #ffc4e8;
  cursor: pointer;
  border-left: 5px solid #f4c2f0;
  border-right: 5px solid #f4c2f0;
  border-radius: 5px;
}
.switcher-wrapper {
  display: inline-block;
  position: relative;
  left: 60%;
  top: 6%;
}
.switcher {
  position: absolute;
  left: 0;
  bottom: 0;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background-color: #ffd6ec;
  border: 2px solid #f4c2f0;
  box-shadow: #ffe6f51a 0px 0.0625em 0.0625em, #ffe6f51a 0px 0.0125em, #ffffff1a 0px 0px 0px 1px inset;
  cursor: pointer;
  transform: rotate(-10deg);
  transition: all 0.3s linear;
}
.switcher::before {
  content: '';
  position: absolute;
  left: 30px;
  top: 0;
  width: 3px;
  height: 30px;
  background-color: #f4c2f0;
  transform: rotate(-15deg);
}
.switcher.switcher_active {
  transform: rotate(42deg);
  transition: all 0.3s linear;
}
.switcher-green {
  position: absolute;
  width: 12px;
  height: 12px;
  left: 60px;
  top: -100px;
  border-radius: 50%;
  border: 1px solid #f4c2f0;
  background-color: #ffd6ec;
  filter: blur(1px);
  transition: all 0.3s linear;
}
.switcher-green_active {
  background-color: #ffb6f1;
  box-shadow: 0px 0px 10px 2px #ffb6f1, inset 0px 0px 10px 1px #ffb6f1;
  transition: all 0.3s linear;
}
.switcher-red {
  position: absolute;
  width: 12px;
  height: 12px;
  left: 10px;
  top: -100px;
  border-radius: 50%;
  border: 1px solid #f4c2f0;
  background-color: #ffd6ec;
  filter: blur(1px);
  transition: all 0.3s linear;
}
.switcher-red_active {
  background-color: #ff8adf;
  box-shadow: 0px 0px 10px 1px #ff8adf, inset 0px 0px 10px 1px #ff8adf;
  transition: all 0.3s linear;
}

.songs-library {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 30px;
}
.album {
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: #00000029 0px 3px 6px, #0000003b 0px 3px 6px;
  cursor: pointer;
  transition: all 0.4s ease-in-out;
}
.album:hover {
  transform: scale(1.1);
}
.songs-library:hover > :not(:hover) {
  filter: blur(3px);
  opacity: 0.5;
}

</style>
</head>

</head>
<body>
  <div class="player">
    <div class="platter">
      <span class="shadow"></span>
      <span class="color"></span>
    </div>
    <div class="controller-wrapper">
      <div class="controller">
        <span class="footer"></span>
        <span class="axis"></span>
        <span class="head"></span>
      </div>
    </div>
    <div class="volume">
      <input 
        type="range"
        class="volume-range"
        min="0"
        max="1"
        step="0.1"
        value="0.8"
      >
    </div>
    <div class="switcher-wrapper">
      <div class="switcher"></div>
      <span class="switcher-red"></span>
      <span class="switcher-green"></span>
    </div>
  </div>
  <div class="songs-library">
    <div class="album">
      <img src="https://file.garden/aXTkw7hiK3vn4ais/download%20(5).gif" alt="Image">
      <audio src="https://file.garden/aXTkw7hiK3vn4ais/Lonely%20in%20Gorgeous.mp3"></audio>
    </div>
    <div class="album">
      <img src="https://file.garden/aXTkw7hiK3vn4ais/download%20(7).gif" alt="Image">
      <audio src="https://file.garden/aXTkw7hiK3vn4ais/Apple%20Pie.mp3"></audio>
    </div>
    <div class="album">
      <img src="https://file.garden/aXTkw7hiK3vn4ais/download%20(6).gif" alt="Image">
      <audio src="https://file.garden/aXTkw7hiK3vn4ais/Lost%20Island.mp3"></audio>
    </div>
    <div class="album">
      <img src="https://file.garden/aXTkw7hiK3vn4ais/%EA%92%B0%20%F0%9F%8C%B8%20%EA%92%B1%E2%94%86%F0%9D%9A%94%F0%9D%9A%92%F0%9D%9A%97%F0%9D%9A%90%F0%9D%9A%98%F0%9D%9A%8F%F0%9D%9A%8C%F0%9D%9A%9B%F0%9D%9A%A2%F0%9D%9A%92%F0%9D%9A%97%F0%9D%9A%90.gif" alt="Image">
      <audio src="https://file.garden/aXTkw7hiK3vn4ais/No%20No%20No%20No%20No%20(No%20No%20No%20No%20No).mp3"></audio>
    </div>
    <div class="album">
      <img src="https://file.garden/aXTkw7hiK3vn4ais/download%20(4).gif" alt="Image">
      <audio src="https://file.garden/aXTkw7hiK3vn4ais/Love%20Is%20Forever.mp3"></audio>
    </div>
    <div class="album">
      <img src="https://file.garden/aXTkw7hiK3vn4ais/Who%20else%20used%20to%20watch%20gliiter%20force%20as%20a%20kid_.gif" alt="Image">
      <audio src="https://file.garden/aXTkw7hiK3vn4ais/Dear%20Heroes.mp3"></audio>
    </div>
  </div>

  <audio src="./music/s-3.mp3" class="player-song" 
  loop preload="auto"></audio>

  <script>
  const switcher = document.querySelector('.switcher')
const controller = document.querySelector('.controller')
const platter = document.querySelector('.platter')
const switcherRed = document.querySelector('.switcher-red')
const switcherGreen = document.querySelector('.switcher-green')
const Song = document.querySelector('.player-song')
const volumeRange = document.querySelector('.volume-range')

switcherRed.classList.add('switcher-red_active')

switcher.addEventListener('click', ()=> {
  switcher.classList.toggle('switcher_active')
  controller.classList.toggle('controller_active')
  platter.classList.toggle('platter_active')
  if(switcher.classList.contains('switcher_active')) {
    switcherGreen.classList.add('switcher-green_active')
    switcherRed.classList.remove('switcher-red_active')
    setTimeout(()=> {
      playerSong.play()
    }, 1000)
  } else {
    switcherGreen.classList.remove('switcher-green_active')
    switcherRed.classList.add('switcher-red_active')
    playerSong.pause()
  }
})

volumeRange.addEventListener('input', (e)=> {
  playerSong.volume = Number(e.target.value)
})

const song = document.querySelectorAll('.song')
const album = document.querySelectorAll('.album')
album.forEach(element => {
  element.addEventListener('click', () => {
    const albumSong = element.querySelector('audio') // selects the audio inside the album
    playerSong.src = albumSong.src
    playerSong.pause()
    playerSong.play()
  })
})
const platterColor = document.querySelector('.color')
album.forEach( element => {
  element.addEventListener('click', ()=> {
    playerSong.src = ''
    let albumSong = element.children[1].src
    playerSong.src = albumSong
    platterColor.style.backgroundColor = randomColors()
    function randomColors() {
      return '#' + Math.floor(Math.random() * 19777215).toString(16);
    }
    playerSong.pause()
    playerSong.play()
  })
})
  </script>
</body>
</html>
