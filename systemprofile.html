<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Character Profile</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: "Segoe UI", Arial, sans-serif;
  background:#ffffff;
}

/* MAIN PANEL */

.profile{
  width:420px;
  padding:26px 28px 30px 28px;
  position:relative;
  color:white;

  background:
    linear-gradient(145deg,#2c77c9,#4aa0ff 60%,#6bb6ff);

  border:2px solid rgba(180,220,255,0.7);
  border-radius:12px;

  box-shadow:
    0 0 20px rgba(80,170,255,.7),
    inset 0 0 25px rgba(255,255,255,.15);
}

/* INNER FRAME */

.profile::before{
  content:"";
  position:absolute;
  inset:8px;
  border:1px solid rgba(200,230,255,.6);
  border-radius:8px;
}

/* CORNER DECORATIONS */

.profile::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;

  background:
  linear-gradient(#9bd0ff,#9bd0ff) top left,
  linear-gradient(#9bd0ff,#9bd0ff) top right,
  linear-gradient(#9bd0ff,#9bd0ff) bottom left,
  linear-gradient(#9bd0ff,#9bd0ff) bottom right;

  background-size:20px 3px;
  background-repeat:no-repeat;

  opacity:.7;
}

/* WINDOW CONTROLS */

.window-controls{
  position:absolute;
  top:10px;
  right:12px;
  display:flex;
  gap:6px;
}

.window-btn{
  width:18px;
  height:18px;
  border:1px solid rgba(255,255,255,.6);
  border-radius:3px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:12px;
  color:white;
  background:rgba(255,255,255,0.1);
  transition:0.2s;
}

.window-btn:hover{
  background:rgba(255,255,255,0.3);
}

/* TITLE */

.title{
  text-align:center;
  font-weight:700;
  font-size:22px;
  letter-spacing:1px;
  margin-bottom:18px;

  animation:textGlow 4s ease-in-out infinite;
}

/* TEXT */

.section{
  margin-bottom:12px;
  font-size:14px;
  line-height:1.5;

  animation:textGlow 6s ease-in-out infinite;
}

.section strong{
  color:#e8f5ff;
}

/* TEXT GLOW */

@keyframes textGlow{

0%{
text-shadow:0 0 2px rgba(255,255,255,.2);
opacity:.95;
}

50%{
text-shadow:
0 0 8px rgba(255,255,255,.8),
0 0 16px rgba(120,200,255,.7);
opacity:1;
}

100%{
text-shadow:0 0 2px rgba(255,255,255,.2);
opacity:.95;
}

}

/* SCANLINE EFFECT */

.profile .scanlines{
  position:absolute;
  inset:0;
  pointer-events:none;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.05),
      rgba(255,255,255,0.05) 2px,
      transparent 2px,
      transparent 4px
    );

  animation:scanMove 6s linear infinite;
  opacity:.35;
}

@keyframes scanMove{
  from{background-position:0 0;}
  to{background-position:0 40px;}
}

/* MINIMIZE */

.minimized .content{
  display:none;
}

/* MAXIMIZE */

.maximized{
  width:90vw;
  height:90vh;
  overflow:auto;
}

</style>
</head>

<body>

<div class="profile" id="panel">

<div class="scanlines"></div>

<div class="window-controls">
<div class="window-btn" onclick="minimize()">—</div>
<div class="window-btn" onclick="maximize()">□</div>
<div class="window-btn" onclick="closePanel()">×</div>
</div>

<div class="content">

<div class="title">&lt; CHARACTER PROFILE &gt;</div>

<div class="section"><strong>NAME:</strong> tba</div>
<div class="section"><strong>AGE:</strong> tba</div>

<div class="section">
<strong>CORE ABILITY</strong><br>
TBA
</div>

<div class="section">
<strong>ULTIMATE SKILL:</strong> TBA
</div>

<div class="section">
<strong>PASSIVE SKILLS:</strong><br>
tba<br>
tba<br>
tba
</div>

<div class="section">
<strong>ACTIVE SKILLS:</strong><br>
tba<br>
tba<br>
tba
</div>

<div class="section">
<strong>UTILITY SKILLS:</strong><br>
TBA<br>
tba<br>
tba
</div>

<div class="section">
<strong>OVERALL STATS</strong><br>
[STAMINA LVL. 0], [STRENGTH LVL. 0], [AGILITY LV. 0], [MANA LVL. 0]
</div>

</div>
</div>

<script>

const panel = document.getElementById("panel");

function minimize(){
panel.classList.toggle("minimized");
}

function maximize(){
panel.classList.toggle("maximized");
}

function closePanel(){
panel.style.display="none";
}

</script>

</body>
</html>
